<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historia de Amor</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  background: url('fondo.jpg') no-repeat center center;
  background-size: cover;
}

/* Contenedor responsive */
.container {
  width: 90%;
  max-width: 600px;
  margin: 40px auto;
  padding: 25px 18px;
  text-align: center;
  color: #222;

  background: rgba(255,255,255,0.60);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.4);
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Texto adaptado a móvil */
.container > div:first-child {
  font-size: 16px;
  line-height: 1.6;
  font-weight: 500;
}

.container b {
  font-size: 26px;
  font-weight: 700;
  color: #b02a5b;
  display: inline-block;
  margin-bottom: 10px;
}

/* Timer más legible en celular */
.time {
  font-size: 20px;
  margin-top: 18px;
  font-weight: 700;
  color: #b02a5b;
}

/* Pétalos */
.petal {
  position: absolute;
  width: 10px;
  height: 16px;
  background: radial-gradient(circle, #ff8fa3, #ff4d6d);
  border-radius: 50%;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* Botón invisible */
.reset {
  position: fixed;
  bottom: 15px;
  right: 15px;
  width: 50px;
  height: 50px;
  opacity: 0;
  cursor: pointer;
}

@media (max-width: 480px) {
  .container {
    margin: 25px auto;
    padding: 20px 15px;
  }

  .container > div:first-child {
    font-size: 15px;
  }

  .container b {
    font-size: 22px;
  }

  .time {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div>
    <b>Tulipanes para el amor de mi vida:</b><br><br>
    Si pudiera elegir un lugar seguro, sería a tu lado.<br><br>
    Time is great with you my girl.<br><br>
    Cuanto más tiempo estoy contigo más te amo.<br><br>
    <b>¡Te amo!</b><br><br>
    Esta bonita historia de amor comenzó:
  </div>

  <div class="time" id="display">
    0 días 00 horas 00 minutos 00 segundos
  </div>
</div>

<div class="reset" onclick="toggleTimer()"></div>

<script>
// pétalos (SIN CAMBIOS)
for (let i = 0; i < 30; i++) {
  const p = document.createElement("div");
  p.className = "petal";
  p.style.left = Math.random() * 100 + "%";
  p.style.animationDuration = (6 + Math.random() * 5) + "s";
  p.style.animationDelay = Math.random() * 5 + "s";
  document.body.appendChild(p);
}

// 🔥 SOLO ARREGLADO: persistencia del tiempo
let startTime = localStorage.getItem("startTime");
let interval = null;
let running = false;

function updateTimer() {
  if (!startTime) return;

  const diff = Math.floor((Date.now() - startTime) / 1000);
  const d = Math.floor(diff / 86400);
  const h = Math.floor((diff % 86400) / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;

  document.getElementById("display").innerText =
    `${d} días ${String(h).padStart(2,'0')} horas ${String(m).padStart(2,'0')} minutos ${String(s).padStart(2,'0')} segundos`;
}

function toggleTimer() {
  if (!running) {
    startTime = Date.now();
    localStorage.setItem("startTime", startTime);
    interval = setInterval(updateTimer, 1000);
    running = true;
  } else {
    clearInterval(interval);
    localStorage.removeItem("startTime");
    startTime = null;
    running = false;

    document.getElementById("display").innerText =
      `0 días 00 horas 00 minutos 00 segundos`;
  }
}

// auto inicio si ya existe
if (startTime) {
  interval = setInterval(updateTimer, 1000);
  running = true;
}
</script>

</body>
</html>
